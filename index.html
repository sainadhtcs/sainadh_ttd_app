<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>My To-Do List</title>
  <meta name="description" content="A simple, fast to-do list app that saves your tasks in your browser." />
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <main class="app">
    <header class="app-header">
      <h1>📝 My To-Do List</h1>
      <p class="subtitle">Simple. Fast. Saved automatically.</p>
    </header>

    <form id="todo-form" class="todo-form">
      <input
        type="text"
        id="todo-input"
        placeholder="What do you need to do?"
        maxlength="120"
        autocomplete="off"
        required
      />
      <button type="submit">Add</button>
    </form>

    <div class="filters">
      <button class="filter-btn active" data-filter="all">All</button>
      <button class="filter-btn" data-filter="active">Active</button>
      <button class="filter-btn" data-filter="completed">Completed</button>
    </div>

    <ul id="todo-list" class="todo-list"></ul>

    <p id="empty-state" class="empty-state">No tasks yet. Add one above! 🎉</p>

    <footer class="app-footer">
      <span id="items-left">0 items left</span>
      <button id="clear-completed" class="clear-btn">Clear completed</button>
    </footer>
  </main>

  <script src="script.js"></script>
</body>
</html>
